<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sejin + Song</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- 1) Intro scroll animation zone -->
  <section class="scrollZone" id="scrollZone">
    <div class="stage">
      <div class="type">
        <!-- Stage 0 -->
        <h1 class="type__line is-0" id="t0">
          <span class="left">sejin</span>
          <span class="plus">+</span>
          <span class="right">song</span>
        </h1>

        <!-- Stage 1 -->
        <h1 class="type__line is-1" id="t1" aria-hidden="true">
          <span class="left">se</span>
          <span class="plus">+</span>
          <span class="right">so</span>
        </h1>

        <!-- Stage 2 -->
        <h1 class="type__line is-2" id="t2" aria-hidden="true">
          <span class="left">s</span>
          <span class="plus">+</span>
          <span class="right">s</span>
        </h1>
      </div>
    </div>
  </section>

  <!-- 2) ONE page -->
  <section class="onePage" id="one">
    <header class="oneTop">
      <div class="oneTop__left">Sejin Song</div>

      <!-- ✅ center button (toggle) -->
      <button class="modeBtn" id="modeBtn" type="button" aria-label="Toggle theme">
        Mode
      </button>

      <nav class="oneTop__right">
        <a href="#about" class="navLink is-active">About</a>
        <a href="#work" class="navLink">Work</a>
      </nav>
    </header>

    <div class="oneBig">
      <div class="oneBig__word">ONE</div>
    </div>

   <footer class="oneBottom">

  <!-- LEFT -->
  <a class="footLink" href="mailto:s7e.song@gmail.com">
    Email
  </a>

  <!-- CENTER -->
  <div class="footCenter">
  </div>

  <!-- RIGHT -->
  <a class="footLink" href="https://www.instagram.com/ssejinnnn/" target="_blank">
    Instagram
  </a>

</footer>

  </section>

  <script src="script.js"></script>
</body>
</html>
