<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sejin + Song</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- 1) Intro scroll animation zone -->
  <section class="scrollZone" id="scrollZone">
    <div class="stage">
      <div class="type">
        <!-- Stage 0 -->
        <h1 class="type__line is-0" id="t0">
          <span class="left">sejin</span>
          <span class="plus">+</span>
          <span class="right">song</span>
        </h1>

        <!-- Stage 1 -->
        <h1 class="type__line is-1" id="t1" aria-hidden="true">
          <span class="left">se</span>
          <span class="plus">+</span>
          <span class="right">so</span>
        </h1>

        <!-- Stage 2 -->
        <h1 class="type__line is-2" id="t2" aria-hidden="true">
          <span class="left">s</span>
          <span class="plus">+</span>
          <span class="right">s</span>
        </h1>
      </div>
    </div>
  </section>

  <!-- 2) Portfolio page (replacing ONE) -->
  <section class="onePage" id="one">
    <header class="oneTop">
      <div class="oneTop__left">Sejin Song</div>

      <button class="modeBtn" id="modeBtn" type="button" aria-label="Toggle theme">
        Mode
      </button>

      <nav class="oneTop__right">
        <a href="About/index.html" class="navLink">About</a>
        <a href="#work" class="navLink is-active">Work</a>
      </nav>
    </header>

    <main class="portfolioMain" id="work">
      <article class="projectCard">
        <a href="wateronmars/index.html" class="projectLink">
          <div class="projectImageWrap">
            <img src="wateronmars.png" alt="Water on Mars book design preview" class="projectImage" />
          </div>
          <div class="projectMeta">
            <h2 class="projectTitle">Water on Mars</h2>
            <p class="projectType">Book Design</p>
            <p class="projectYear">2025</p>
          </div>
        </a>
      </article>

      <article class="projectCard">
        <a href="clocktunnel/index.html" class="projectLink">
          <div class="projectImageWrap">
            <img src="clocktunnel.jpg" alt="Clock Tunnel web design preview" class="projectImage" />
          </div>
          <div class="projectMeta">
            <h2 class="projectTitle">Clock Tunnel</h2>
            <p class="projectType">Web Design</p>
            <p class="projectYear">2026</p>
          </div>
        </a>
      </article>


    <footer class="oneBottom">
      <a class="footLink" href="mailto:s7e.song@gmail.com">Email</a>
      <div class="footCenter"></div>
      <a class="footLink" href="https://www.instagram.com/sesorchive" target="_blank" rel="noopener noreferrer">
        Instagram
      </a>
    </footer>
  </section>

</body>
</html>
<script src="script.js"></script>
